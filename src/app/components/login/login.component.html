<div class="login-wrapper">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-4 login-card">
        <h2 class="text-center mb-4 login-title">LOGIN</h2>

        <div class="alert alert-info py-2 text-center" role="status">
          {{ infoMessage }}
        </div>

        <form
          [formGroup]="loginForm"
          (ngSubmit)="onSubmit()"
          data-cy="login-form"
        >
          <div class="form-group mb-3">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              class="form-control"
              formControlName="email"
              data-cy="login-email"
              [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            />
            <div
              *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
              class="invalid-feedback"
            >
              Ingresa un email valido.
            </div>
          </div>

          <div class="form-group mb-3">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              class="form-control"
              formControlName="password"
              data-cy="login-password"
              [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            />
            <div
              *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
              class="invalid-feedback"
            >
              La contrasena debe tener al menos 6 caracteres.
            </div>
          </div>

          <button
            type="submit"
            class="w-100 login-button"
            [disabled]="loginForm.invalid || enviando"
            data-cy="login-submit"
          >
            <span
              *ngIf="enviando"
              class="spinner-border spinner-border-sm me-2"
              aria-hidden="true"
            ></span>
            {{ enviando ? 'Ingresando...' : 'Login' }}
          </button>

          <div
            *ngIf="errorMessage"
            class="alert alert-danger mt-3"
            data-cy="login-error"
          >
            {{ errorMessage }}
          </div>

          <div class="mt-3 text-center register-link">
            <p>
              No tienes cuenta?
              <a
                routerLink="/registro"
                class="link-primary"
                data-cy="link-registro"
              >
                Registrate aqui
              </a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
